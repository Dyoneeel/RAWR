<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAWR Dashboard | Your Lion's Den</title>
    <meta name="description" content="Your RAWR dashboard: track your tokens, mining, stats, and play games in the Lion's Den.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --primary-dark: #FFA500;
            --secondary: #FF6B35;
            --bg-dark: #1a1a1a;
            --bg-darker: #121212;
            --bg-gradient: linear-gradient(135deg, #1a1a1a 0%, #2d1810 50%, #1a1a1a 100%);
            --text-light: #f0f0f0;
            --text-muted: #ccc;
            --success: #4CAF50;
            --error: #f44336;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><radialGradient id="stars"><stop offset="0%" stop-color="%23FFD700" stop-opacity="1"/><stop offset="100%" stop-color="%23FFD700" stop-opacity="0"/></radialGradient></defs><circle cx="100" cy="100" r="2" fill="url(%23stars)"/><circle cx="300" cy="200" r="1.5" fill="url(%23stars)"/><circle cx="500" cy="150" r="1" fill="url(%23stars)"/><circle cx="700" cy="300" r="2" fill="url(%23stars)"/><circle cx="900" cy="250" r="1.5" fill="url(%23stars)"/><circle cx="1100" cy="400" r="1" fill="url(%23stars)"/></svg>') repeat;
            opacity: 0.3;
            animation: twinkle 4s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1rem 2rem 1rem;
            position: relative;
            z-index: 1;
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .lion-emoji {
            font-size: 3rem;
            cursor: pointer;
            animation: bounce 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }
        .lion-emoji:hover {
            transform: scale(1.15) rotate(5deg);
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.2); }
        }

        .dashboard-nav {
            display: flex;
            gap: 1rem;
        }
        .nav-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: var(--primary);
            padding: 0.7rem 1.5rem;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            text-decoration: none;
        }
        .nav-btn.active, .nav-btn:hover {
            background: var(--primary);
            color: var(--bg-darker);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);
        }

        .dashboard-main {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }
        @media (max-width: 900px) {
            .dashboard-main {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            background: rgba(255, 215, 0, 0.08);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            border: 1px solid rgba(255, 215, 0, 0.15);
            min-width: 250px;
            max-width: 350px;
            margin-bottom: 2rem;
        }
        .sidebar-title {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
        }
        .profile-block {
            text-align: center;
            margin-bottom: 2rem;
        }
        .profile-avatar {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .profile-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.2rem;
        }
        .profile-id {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .balance-block {
            background: rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .balance-label {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .balance-amount {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 900;
            margin: 0.2rem 0 0.5rem 0;
        }
        .balance-actions {
            display: flex;
            gap: 0.7rem;
            justify-content: center;
        }
        .balance-btn {
            background: var(--primary);
            color: var(--bg-darker);
            border: none;
            border-radius: 12px;
            padding: 0.4rem 1.1rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.97rem;
            transition: background 0.2s;
        }
        .balance-btn:hover {
            background: var(--primary-dark);
        }

        .sidebar-links {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .sidebar-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .sidebar-link:hover {
            color: var(--secondary);
        }

        .main-content {
            background: rgba(255, 215, 0, 0.06);
            border-radius: 20px;
            padding: 2rem 2.5rem;
            border: 1px solid rgba(255, 215, 0, 0.13);
            min-height: 600px;
            position: relative;
        }
        .main-title {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
        }
        .dashboard-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }
        .dashboard-stat {
            flex: 1;
            min-width: 180px;
            background: rgba(255, 215, 0, 0.09);
            border-radius: 15px;
            padding: 1.2rem 1rem;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.13);
            margin-bottom: 1rem;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
        }

        .dashboard-actions {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }
        .dashboard-action-btn {
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            color: var(--bg-darker);
            border: none;
            border-radius: 20px;
            padding: 1rem 2.2rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 180px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15);
        }
        .dashboard-action-btn:hover {
            background: var(--primary-dark);
            color: var(--bg-darker);
            transform: translateY(-3px);
        }

        .dashboard-section {
            margin-bottom: 2.5rem;
        }
        .section-title {
            color: var(--primary);
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .recent-activity-list {
            list-style: none;
            padding: 0;
        }
        .recent-activity-item {
            padding: 1rem 0.5rem;
            border-bottom: 1px solid rgba(255, 215, 0, 0.07);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .activity-icon {
            font-size: 1.5rem;
        }
        .activity-desc {
            color: var(--text-light);
            font-size: 1rem;
        }
        .activity-time {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-left: auto;
        }

        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            max-width: 300px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }
        .notification.success {
            background: var(--success);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.3);
        }
        .notification.error {
            background: var(--error);
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.3);
        }
        .notification.info {
            background: var(--primary);
            color: var(--bg-darker);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        @media (max-width: 600px) {
            .dashboard-container {
                padding: 1rem 0.2rem;
            }
            .main-content {
                padding: 1rem 0.5rem;
            }
            .dashboard-header {
                flex-direction: column;
                gap: 1rem;
            }
            .dashboard-main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-bg"></div>
    <div class="notification" id="notification">
        <span class="notification-icon">🦁</span>
        <span class="notification-text"></span>
    </div>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="logo-header">
                <span class="lion-emoji" onclick="roarEffect()">🦁</span>
                <span class="logo">RAWR</span>
            </div>
            <nav class="dashboard-nav">
                <a href="dashboard.html" class="nav-btn active">Dashboard</a>
                <a href="#" class="nav-btn">Casino</a>
                <a href="#" class="nav-btn">Mining</a>
                <a href="#" class="nav-btn">Leaderboard</a>
                <a href="login.html" class="nav-btn">Logout</a>
            </nav>
        </div>
        <div class="dashboard-main">
            <aside class="sidebar">
                <div class="sidebar-title">Your Profile</div>
                <div class="profile-block">
                    <div class="profile-avatar">🦁</div>
                    <div class="profile-name" id="profileName">LionKing</div>
                    <div class="profile-id" id="profileId">#001247</div>
                </div>
                <div class="balance-block">
                    <div class="balance-label">RAWR Balance</div>
                    <div class="balance-amount" id="rawrBalance">2,500</div>
                    <div class="balance-actions">
                        <button class="balance-btn" onclick="showNotification('Deposit coming soon!', 'info')">Deposit</button>
                        <button class="balance-btn" onclick="showNotification('Withdraw coming soon!', 'info')">Withdraw</button>
                    </div>
                </div>
                <div class="sidebar-links">
                    <a href="#" class="sidebar-link">Account Settings</a>
                    <a href="#" class="sidebar-link">Security</a>
                    <a href="#" class="sidebar-link">Support</a>
                </div>
            </aside>
            <main class="main-content">
                <div class="main-title">Welcome back, <span id="mainLionName">LionKing</span>!</div>
                <div class="dashboard-stats">
                    <div class="dashboard-stat">
                        <div class="stat-number" id="statGamesPlayed">1,024</div>
                        <div class="stat-label">Games Played</div>
                    </div>
                    <div class="dashboard-stat">
                        <div class="stat-number" id="statTokensMined">5,000</div>
                        <div class="stat-label">RAWR Mined</div>
                    </div>
                    <div class="dashboard-stat">
                        <div class="stat-number" id="statWins">789</div>
                        <div class="stat-label">Wins</div>
                    </div>
                    <div class="dashboard-stat">
                        <div class="stat-number" id="statWinRate">77.1%</div>
                        <div class="stat-label">Win Rate</div>
                    </div>
                </div>
                <div class="dashboard-actions">
                    <button class="dashboard-action-btn" onclick="showNotification('Casino coming soon!', 'info')">🎲 Play Casino</button>
                    <button class="dashboard-action-btn" onclick="showNotification('Mining coming soon!', 'info')">⛏️ Mine More RAWR</button>
                    <button class="dashboard-action-btn" onclick="showNotification('Leaderboard coming soon!', 'info')">🏆 View Leaderboard</button>
                </div>
                <div class="dashboard-section">
                    <div class="section-title">Recent Activity</div>
                    <ul class="recent-activity-list" id="recentActivity">
                        <!-- Recent activity will be injected here -->
                    </ul>
                </div>
            </main>
        </div>
    </div>
    <script>
        // Roar effect for lion emoji
        function roarEffect() {
            const lion = document.querySelector('.lion-emoji');
            const originalTransform = lion.style.transform;
            lion.style.transform = 'scale(1.3) rotate(10deg)';
            lion.style.filter = 'brightness(1.5)';
            setTimeout(() => {
                lion.style.transform = originalTransform;
                lion.style.filter = '';
            }, 300);
            showFloatingText('RAWR! 🦁');
            // Play sound if available
            if (typeof Audio !== 'undefined') {
                const roar = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-angry-wild-animal-roar-11.mp3');
                roar.volume = 0.3;
                roar.play().catch(e => {});
            }
        }

        // Floating text animation
        function showFloatingText(text) {
            const floatingText = document.createElement('div');
            floatingText.textContent = text;
            floatingText.style.cssText = `
                position: fixed;
                top: 30%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 2.2rem;
                font-weight: bold;
                color: var(--primary);
                pointer-events: none;
                z-index: 1000;
                animation: fadeUpOut 2s ease-out forwards;
                text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            `;
            document.body.appendChild(floatingText);
            setTimeout(() => {
                floatingText.remove();
            }, 2000);
        }

        // Notification
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            const textElement = notification.querySelector('.notification-text');
            notification.classList.remove('success', 'error', 'info', 'show');
            textElement.textContent = message;
            notification.classList.add(type);
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);
            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }

        // Example recent activity data
        const activityData = [
            { icon: "🎰", desc: "Played Jungle Jackpot", time: "2 mins ago" },
            { icon: "⛏️", desc: "Mined 10 RAWR tokens", time: "10 mins ago" },
            { icon: "🏆", desc: "Ranked up to Silver Lion", time: "1 hour ago" },
            { icon: "🎲", desc: "Won 50 RAWR in Dice", time: "2 hours ago" },
            { icon: "💰", desc: "Deposited 500 RAWR", time: "Yesterday" }
        ];
        function renderRecentActivity() {
            const list = document.getElementById('recentActivity');
            list.innerHTML = '';
            activityData.forEach(item => {
                const li = document.createElement('li');
                li.className = 'recent-activity-item';
                li.innerHTML = `
                    <span class="activity-icon">${item.icon}</span>
                    <span class="activity-desc">${item.desc}</span>
                    <span class="activity-time">${item.time}</span>
                `;
                list.appendChild(li);
            });
        }
        renderRecentActivity();

        // Animate stats (demo)
        setInterval(() => {
            let games = parseInt(document.getElementById('statGamesPlayed').textContent.replace(/,/g,'')) + Math.floor(Math.random()*3);
            document.getElementById('statGamesPlayed').textContent = games.toLocaleString();
            let mined = parseInt(document.getElementById('statTokensMined').textContent.replace(/,/g,'')) + Math.floor(Math.random()*2);
            document.getElementById('statTokensMined').textContent = mined.toLocaleString();
            let wins = parseInt(document.getElementById('statWins').textContent.replace(/,/g,'')) + Math.floor(Math.random()*2);
            document.getElementById('statWins').textContent = wins.toLocaleString();
            let winRate = 70 + Math.random()*30;
            document.getElementById('statWinRate').textContent = winRate.toFixed(1) + "%";
        }, 7000);

        // Add fadeUpOut animation
        const fadeUpCSS = `
            @keyframes fadeUpOut {
                0% { opacity: 1; transform: translate(-50%, -50%);}
                100% { opacity: 0; transform: translate(-50%, -100px);}
            }
        `;
        const style = document.createElement('style');
        style.textContent = fadeUpCSS;
        document.head.appendChild(style);
    </script>
</body>
</html>
